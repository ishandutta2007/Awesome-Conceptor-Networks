<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a051b"/>
      <stop offset="50%" stop-color="#0f0c2e"/>
      <stop offset="100%" stop-color="#1c164a"/>
    </linearGradient>
    
    <!-- Accent Gradients -->
    <linearGradient id="accent-cyan" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f2fe" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#4facfe" stop-opacity="0.2"/>
    </linearGradient>
    <linearGradient id="accent-purple" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f355da" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#7000ff" stop-opacity="0.2"/>
    </linearGradient>

    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="200" rx="12" fill="url(#bg-grad)"/>

  <!-- Geometric Abstract Network Shapes -->
  <g stroke="#ffffff" stroke-opacity="0.1" stroke-width="1">
    <line x1="50" y1="30" x2="150" y2="80"/>
    <line x1="150" y1="80" x2="100" y2="150"/>
    <line x1="100" y1="150" x2="220" y2="120"/>
    <line x1="220" y1="120" x2="300" y2="40"/>
    <line x1="300" y1="40" x2="450" y2="160"/>
    <line x1="450" y1="160" x2="520" y2="70"/>
    <line x1="520" y1="70" x2="680" y2="130"/>
    <line x1="680" y1="130" x2="740" y2="50"/>
  </g>

  <!-- Constellation Nodes -->
  <g fill="#4facfe" opacity="0.6">
    <circle cx="50" cy="30" r="4"/>
    <circle cx="150" cy="80" r="5" fill="#f355da" filter="url(#glow)"/>
    <circle cx="100" cy="150" r="3"/>
    <circle cx="220" cy="120" r="6" fill="#00f2fe" filter="url(#glow)"/>
    <circle cx="300" cy="40" r="4"/>
    <circle cx="450" cy="160" r="5"/>
    <circle cx="520" cy="70" r="6" fill="#f355da" filter="url(#glow)"/>
    <circle cx="680" cy="130" r="4"/>
    <circle cx="740" cy="50" r="5" fill="#00f2fe" filter="url(#glow)"/>
  </g>

  <!-- Conceptor Ellipses (Subspace Projection Visualizer) -->
  <ellipse cx="400" cy="100" rx="280" ry="60" fill="none" stroke="url(#accent-cyan)" stroke-width="2" stroke-dasharray="8,4" opacity="0.4"/>
  <ellipse cx="400" cy="100" rx="200" ry="45" fill="none" stroke="url(#accent-purple)" stroke-width="1.5" opacity="0.6"/>

  <!-- Logo and Typography -->
  <g text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">
    <text x="400" y="95" fill="#ffffff" font-size="34" font-weight="900" letter-spacing="4" filter="url(#glow)">CONCEPTOR NETWORKS MAP</text>
    <text x="400" y="130" fill="#a0aec0" font-size="14" font-weight="500" letter-spacing="1">Soft-Projection Regularizers &amp; Quasi-Boolean Logical Subspaces</text>
  </g>
</svg>
